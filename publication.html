    <script>
      function getCategory(authors) {
        const list = authors.split(',').map(a => a.trim());
        const clean = n => n.replace(/[\s*()]+/g, '').replace(/Equal/gi, '');
        if (clean(list[0]) === 'WenhuChen') return 'first-author';
        if (clean(list[list.length - 1]) === 'WenhuChen') return 'last-author';
        const starred = list.filter(a => a.includes('*'));
        if (starred.length > 0 && starred.some(a => clean(a) === 'WenhuChen')) return 'first-author';
        return 'collaboration';
      }

      function getVenueClass(venue) {
        const v = venue.toLowerCase();
        if (v.includes('findings'))    return 'venue-findings';
        if (v.includes('workshop'))    return 'venue-workshop';
        if (v.includes('manuscript'))  return 'venue-preprint';
        if (v.includes('tech report')) return 'venue-preprint';
        if (v.includes('neurips'))     return 'venue-neurips';
        if (v.includes('icml'))        return 'venue-icml';
        if (v.includes('iclr'))        return 'venue-iclr';
        if (v.includes('acl 2') || v.match(/acl\s/)) return 'venue-acl';
        if (v.includes('emnlp'))       return 'venue-emnlp';
        if (v.includes('naacl'))       return 'venue-naacl';
        if (v.includes('cvpr'))        return 'venue-cvpr';
        if (v.includes('iccv'))        return 'venue-iccv';
        if (v.includes('eccv'))        return 'venue-eccv';
        if (v.includes('wacv'))        return 'venue-wacv';
        if (v.includes('aaai'))        return 'venue-aaai';
        if (v.includes('colm'))        return 'venue-colm';
        if (v.includes('tmlr'))        return 'venue-tmlr';
        if (v.includes('kdd'))         return 'venue-kdd';
        if (v.includes('eacl'))        return 'venue-eacl';
        if (v.includes('aacl') || v.includes('ijcnlp')) return 'venue-aacl';
        return 'venue-other';
      }

      function getVenueLabel(venue) {
        const v = venue.toLowerCase();
        if (v.includes('manuscript') || v.includes('tech report')) return 'Preprint';
        const patterns = [
          [/findings\s+of\s+(\w+)\s+(\d{4})/, (m) => m[1].toUpperCase() + ' ' + m[2] + ' (Findings)'],
          [/(\w+)\s+workshop/i, (m) => m[1].toUpperCase() + ' Workshop'],
          [/(neurips|icml|iclr|emnlp|naacl|cvpr|iccv|eccv|wacv|aaai|colm|kdd|eacl|interspeech|amta)\s*(\d{4})/i,
            (m) => m[1].toUpperCase() + ' ' + m[2]],
          [/(acl)\s+(\d{4})/i, (m) => 'ACL ' + m[2]],
          [/tmlr\s*(\d{4})/i, (m) => 'TMLR ' + m[1]],
          [/ijcnlp-aacl\s*(\d{4})/i, (m) => 'AACL ' + m[1]],
        ];
        for (const [pat, fn] of patterns) {
          const m = venue.match(pat);
          if (m) return fn(m);
        }
        const yearMatch = venue.match(/\d{4}/);
        return yearMatch ? venue.replace(/<[^>]+>/g, '').trim() : venue;
      }

      function getYear(paper) {
        const venueMatch = paper.venue.match(/(\d{4})/);
        if (venueMatch) return parseInt(venueMatch[1]);
        const arxivMatch = (paper.paper_link || '').match(/(\d{2})(\d{2})\.\d+/);
        if (arxivMatch) return 2000 + parseInt(arxivMatch[1]);
        return 0;
      }

      function highlightMe(authors) {
        return authors.replace(/Wenhu Chen/g, '<span class="me">Wenhu Chen</span>');
      }

      function loadPapers(category) {
        fetch('papers.json')
          .then(response => response.json())
          .then(data => {
            data.forEach((p, i) => p._idx = i);

            const container = document.getElementById(category + "-list");
            container.innerHTML = "";

            let filteredPapers;
            if (category === 'all') {
              filteredPapers = data;
            } else if (category === 'accepted' || category === 'preprint') {
              filteredPapers = data.filter(paper => paper.status.includes(category));
            } else {
              filteredPapers = data.filter(paper => getCategory(paper.authors) === category);
            }

            filteredPapers.sort((a, b) => {
              const yearDiff = getYear(b) - getYear(a);
              return yearDiff !== 0 ? yearDiff : a._idx - b._idx;
            });

            filteredPapers.forEach((paper, idx) => {
              const div = document.createElement("div");
              div.className = "paper-item";

              const venueClass = getVenueClass(paper.venue);
              const venueLabel = getVenueLabel(paper.venue);

              let linksHtml = '';
              if (paper.paper_link) linksHtml += `<a href="${paper.paper_link}">pdf</a>`;
              if (paper.website) linksHtml += `<a href="${paper.website}">website</a>`;
              if (paper.extra_links) {
                for (const [label, url] of Object.entries(paper.extra_links)) {
                  linksHtml += `<a href="${url}">${label}</a>`;
                }
              }

              const awardHtml = paper.award
                ? `<div><span class="award-badge">${paper.award}</span></div>`
                : '';

              div.innerHTML = `
                <div class="paper-title">
                  <span class="paper-number">${idx + 1}</span>${paper.title}
                </div>
                <div class="paper-authors">${highlightMe(paper.authors)}</div>
                <div class="venue-line">
                  <span class="venue-badge ${venueClass}">${venueLabel}</span>${linksHtml}
                </div>
                ${awardHtml}
              `;

              container.appendChild(div);
            });
          })
          .catch(error => console.error('Error loading papers:', error));
      }

      document.addEventListener("DOMContentLoaded", function() {
        loadPapers('accepted');
      });
    </script>
